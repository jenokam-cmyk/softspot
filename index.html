<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Softspot</title>
    
    <link rel="icon" type="image/svg+xml" href="icon.svg?v=6">
    <link rel="apple-touch-icon" href="icon.svg?v=6">
    <link rel="manifest" href="manifest.json?v=6">

    <style>
        :root { --bg: #F9F8F4; --text: #2D2D2D; --accent: #E6E2D3; --white: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .app { width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .brand { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .nav-logo { width: 1.2rem; height: 1.2rem; object-fit: contain; }
        .log-link { cursor: pointer; color: #757575; text-decoration: underline; font-size: 0.9rem; padding: 5px; }

        .screen { display: none; }
        .active { display: block; }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border: 1px solid var(--accent); border-radius: 20px; padding: 25px 10px; cursor: pointer; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        .card-icon { display: block; font-size: 2.1rem; margin-bottom: 5px; pointer-events: none; }
        .card strong { display: block; pointer-events: none; }
        .sub-text { display: block; font-weight: normal; font-size: 0.85rem; color: #757575; margin-top: 4px; pointer-events: none; }

        #trends-container { display: none; margin-top: 40px; padding: 20px; background: var(--white); border-radius: 20px; border: 1px solid var(--accent); font-size: 0.95rem; line-height: 1.6; }
        .trends-title { font-weight: bold; margin-bottom: 8px; display: block; text-transform: uppercase; font-size: 0.75rem; color: #757575; letter-spacing: 1px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(249, 248, 244, 0.98); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .survey-btn { background: var(--white); border: 1px solid var(--accent); padding: 15px; margin: 8px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; font-size: 1.1rem; cursor: pointer; }
        .cancel { margin-top: 25px; color: #757575; text-decoration: underline; cursor: pointer; }
        
        .date-group { margin-top: 25px; }
        .date-header { font-size: 0.85rem; color: #757575; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 10px; }
        .log-item { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { display: inline-block; margin-bottom: 20px; cursor: pointer; color: #757575; text-decoration: underline; }

        .reset-wrapper { margin-top: auto; padding-top: 40px; text-align: center; padding-bottom: 20px; }
        #reset-btn { background: none; border: none; color: #d0d0d0; font-size: 0.75rem; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app">
        <nav>
            <div class="brand"><img src="icon.svg" class="nav-logo"><span>softspot</span></div>
            <div class="log-link" onclick="window.showScreen('history-screen')">log</div>
        </nav>

        <div id="main-screen" class="screen active">
            <h2>Hi! What's happening?</h2>
            <div class="mood-grid">
                <div class="card" onclick="window.openSurvey('bliss')">
                    <span class="card-icon">✨</span>
                    <strong>Bliss</strong>
                    <span class="sub-text">I'm joyful</span>
                </div>
                <div class="card" onclick="window.openSurvey('overwhelm')">
                    <span class="card-icon">🌊</span>
                    <strong>Overwhelm</strong>
                    <span class="sub-text">A strong feeling</span>
                </div>
            </div>
            <div id="trends-container">
                <span class="trends-title">Today's Perspective</span>
                <div id="trends-content"></div>
            </div>
        </div>

        <div id="history-screen" class="screen">
            <div class="back-btn" onclick="window.showScreen('main-screen')">← Back Home</div>
            <div id="logs-list"></div>
        </div>

        <div class="reset-wrapper">
            <button id="reset-btn" onclick="window.clearEverything()">Reset</button>
        </div>
    </div>

    <div id="survey-overwhelm" class="overlay">
        <h3>What's happening?</h3>
        <div class="survey-btn" onclick="window.finishLog('Overwhelm', 'Transition')">Transition</div>
        <div class="survey-btn" onclick="window.finishLog('Overwhelm', 'Work')">Work</div>
        <div class="survey-btn" onclick="window.finishLog('Overwhelm', 'Memory')">Memory</div>
        <div class="survey-btn" onclick="window.finishLog('Overwhelm', 'Connection')">Connection</div>
        <div class="cancel" onclick="window.closeSurveys()">Cancel</div>
    </div>

    <div id="survey-bliss" class="overlay">
        <h3>What's happening?</h3>
        <div class="survey-btn" onclick="window.finishLog('Bliss', 'Creating')">Creating</div>
        <div class="survey-btn" onclick="window.finishLog('Bliss', 'Work')">Work</div>
        <div class="survey-btn" onclick="finishLog('Bliss', 'Memory')">Memory</div>
        <div class="survey-btn" onclick="window.finishLog('Bliss', 'Help')">Help</div>
        <div class="cancel" onclick="window.closeSurveys()">Cancel</div>
    </div>

    <script>
        (function() {
            var KEY = 'softspot_logs';

            window.clearEverything = function() {
                if(confirm("Reset the app? History will be cleared.")) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            window.showScreen = function(id) {
                var screens = document.querySelectorAll('.screen');
                for (var i = 0; i < screens.length; i++) {
                    screens[i].classList.remove('active');
                }
                var target = document.getElementById(id);
                if(target) {
                    target.classList.add('active');
                    if(id === 'history-screen') renderHistory();
                    if(id === 'main-screen') updateTrends();
                }
            };

            window.openSurvey = function(type) {
                var el = document.getElementById('survey-' + type);
                if(el) el.style.display = 'flex';
            };

            window.closeSurveys = function() {
                var overlays = document.querySelectorAll('.overlay');
                for (var i = 0; i < overlays.length; i++) {
                    overlays[i].style.display = 'none';
                }
            };

            window.finishLog = function(mood, reason) {
                var now = new Date();
                var time = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                var date = now.toLocaleDateString('en-US', { month: 'long', day: '2-digit', year: 'numeric' });
                
                var h = [];
                try { 
                    var data = localStorage.getItem(KEY);
                    h = data ? JSON.parse(data) : []; 
                } catch(e) { h = []; }
                
                h.unshift({ mood: mood, reason: reason, time: time, date: date });
                localStorage.setItem(KEY, JSON.stringify(h));
                
                window.closeSurveys();
                updateTrends();
            };

            function updateTrends() {
                var container = document.getElementById('trends-container');
                var content = document.getElementById('trends-content');
                if(!container || !content) return;

                var h = [];
                try { 
                    var data = localStorage.getItem(KEY);
                    h = data ? JSON.parse(data) : []; 
                } catch(e) { h = []; }
                
                var today = new Date().toLocaleDateString('en-US', { month: 'long', day: '2-digit', year: 'numeric' });
                var todayLogs = h.filter(function(l) { return l && l.date === today && l.mood; });

                if (todayLogs.length === 0) { 
                    container.style.display = 'none'; 
                    return; 
                }
                
                container.style.display = 'block';

                var b = todayLogs.filter(function(l) { return l.mood === 'Bliss'; }).length;
                var o = todayLogs.filter(function(l) { return l.mood === 'Overwhelm'; }).length;
                
                var counts = {};
                for (var i = 0; i < todayLogs.length; i++) {
                    var r = todayLogs[i].reason;
                    counts[r] = (counts[r] || 0) + 1;
                }
                
                var maxVal = 0;
                var mostFreq = "";
                for (var key in counts) { 
                    if (counts[key] > maxVal) { 
                        maxVal = counts[key]; 
                        mostFreq = key; 
                    } 
                }

                var patternLine = (maxVal > 3) ? "The thing happening most is " + mostFreq + ", " + maxVal + " times today.<br><br>" : "";
                
                var feedback = "";
                if (b > o) {
                    feedback = " <strong>This is a great day!</strong>";
                } else if (b === o) {
                    feedback = " <br><br>Sounds like an ordinary day. Keep showing up, friend!";
                } else {
                    feedback = " <br><br><em>It's just a moment. Maybe time for an adjustment?</em>";
                }

                content.innerHTML = patternLine + "So far today, you were Blissful " + b + " times and Overwhelmed " + o + " times." + feedback;
            }

            function renderHistory() {
                var list = document.getElementById('logs-list');
                if(!list) return;

                var h = [];
                try { 
                    var data = localStorage.getItem(KEY);
                    h = data ? JSON.parse(data) : []; 
                } catch(e) { h = []; }
                
                var valid = h.filter(function(l) { return l && l.mood && l.date; });

                if (valid.length === 0) { 
                    list.innerHTML = '<p style="text-align:center;color:#757575;padding-top:20px;">No logs yet.</p>'; 
                    return; 
                }
                
                var groups = valid.reduce(function(acc, log) {
                    if (!acc[log.date]) acc[log.date] = [];
                    acc[log.date].push(log);
                    return acc;
                }, {});

                var html = "";
                var dates = Object.keys(groups);
                for(var i=0; i < dates.length; i++) {
                    var date = dates[i];
                    html += '<div class="date-group"><div class="date-header">' + date + '</div>';
                    var items = groups[date];
                    for(var j=0; j < items.length; j++) {
                        var l = items[j];
                        html += '<div class="log-item"><span><strong>' + l.mood + '</strong> (' + l.reason + ')</span><span style="color:#757575;font-size:0.85rem;">' + l.time + '</span></div>';
                    }
                    html += '</div>';
                }
                list.innerHTML = html;
            }

            window.onload = function() {
                updateTrends();
            };
        })();
    </script>
</body>
</html>
