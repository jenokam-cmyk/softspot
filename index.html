<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Softspot</title>
    <style>
        :root { --bg: #F9F8F4; --text: #2D2D2D; --accent: #E6E2D3; --white: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); display: flex; justify-content: center; margin: 0; }
        .app { width: 100%; max-width: 400px; padding: 20px; position: relative; }
        nav { display: flex; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; }
        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border: 1px solid var(--accent); border-radius: 20px; padding: 20px; cursor: pointer; text-align: center; }
        
        /* The Survey Overlay */
        #survey { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(249, 248, 244, 0.95); z-index: 10; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .survey-btn { 
            background: var(--white); border: 1px solid var(--accent); padding: 15px; 
            margin: 5px; border-radius: 12px; width: 80%; max-width: 300px; text-align: center; font-size: 1.1rem;
        }

        .history { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .log-item { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #f0f0f0; }
    </style>
</head>
<body>

    <div id="survey">
        <h3>What's happening?</h3>
        <div class="survey-btn" onclick="finishOverwhelm('Transition')">Transition</div>
        <div class="survey-btn" onclick="finishOverwhelm('Work')">Work</div>
        <div class="survey-btn" onclick="finishOverwhelm('Memory')">Memory</div>
        <div class="survey-btn" onclick="finishOverwhelm('Help from friend')">Help from friend</div>
        <p onclick="document.getElementById('survey').style.display='none'" style="margin-top:20px; color:gray;">Cancel</p>
    </div>

    <div class="app">
        <nav>softspot log</nav>
        <h2>Good morning.</h2>
        <div class="mood-grid">
            <div class="card" onclick="logMood('Bliss')">✨ <br><strong>Bliss</strong></div>
            <div class="card" onclick="showSurvey()">🌊 <br><strong>Overwhelm</strong></div>
        </div>
        <div class="history"><h4>HISTORY</h4><div id="logs"></div></div>
    </div>

    <script>
        // Shows the survey instead of logging immediately
        function showSurvey() {
            document.getElementById('survey').style.display = 'flex';
        }

        // Saves the mood + the specific reason
        function finishOverwhelm(reason) {
            logMood(`Overwhelm (${reason})`);
            document.getElementById('survey').style.display = 'none';
        }

        function logMood(m) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let h = JSON.parse(localStorage.getItem('m')) || [];
            h.unshift({ m, time });
            localStorage.setItem('m', JSON.stringify(h));
            render();
        }

        function render() {
            const h = JSON.parse(localStorage.getItem('m')) || [];
            document.getElementById('logs').innerHTML = h.map(i => 
                `<div class="log-item"><strong>${i.m}</strong> <span style="float:right; color:#757575;">${i.time}</span></div>`
            ).join('');
        }
        
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        render();
    </script>
</body>
</html>
