<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Softspot</title>
    <style>
        :root { --bg: #F9F8F4; --text: #2D2D2D; --accent: #E6E2D3; --white: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .app { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        
        nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .logo { font-weight: bold; }
        .log-link { cursor: pointer; color: #757575; text-decoration: underline; font-size: 0.9rem; z-index: 5; }

        .screen { display: none; }
        .active { display: block; }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border: 1px solid var(--accent); border-radius: 20px; padding: 25px 10px; cursor: pointer; text-align: center; }
        
        .card-icon { display: block; font-size: 2.1rem; margin-bottom: 5px; pointer-events: none; }
        .card strong { display: block; pointer-events: none; }
        .sub-text { display: block; font-weight: normal; font-size: 0.85rem; color: #757575; margin-top: 4px; pointer-events: none; }
