<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Softspot</title>
    <style>
        :root { --bg: #F9F8F4; --text: #2D2D2D; --accent: #E6E2D3; --white: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .app { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        
        nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .logo { font-weight: bold; }
        .log-link { cursor: pointer; color: #757575; text-decoration: underline; font-size: 0.9rem; }

        .screen { display: none; }
        .active { display: block; }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border: 1px solid var(--accent); border-radius: 20px; padding: 25px 10px; cursor: pointer; text-align: center; }
        .card strong { display: block; margin-top: 5px; }
        .sub-text { display: block; font-weight: normal; font-size: 0.85rem; color: #757575; margin-top: 4px; }

        /* Trends Section - Hidden by default */
        #trends-container { 
            display: none;
            margin-top: 40px; 
            padding: 20px; 
            background: var(--white); 
            border-radius: 20px; 
            border: 1px solid var(--accent);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .trends-title { font-weight: bold; margin-bottom: 8px; display: block; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: #757575; }

        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(249, 248, 244, 0.98); z-index: 10; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .survey-btn { background: var(--white); border: 1px solid var(--accent); padding: 15px; margin: 8px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; font-size: 1.1rem; }
